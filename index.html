<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal CI - Gestão de Saúde</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #05316e; /* Azul Institucional Solicitado */
            --primary-dark: #031c40; /* Tom mais escuro para hover */
            --primary-light: #0f52b3; /* Tom um pouco mais claro para detalhes */
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 850px; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 20px -5px rgba(5, 49, 110, 0.15); transition: all 0.3s ease; }
        
        /* Estilos do Logo */
        .logo-login { display: block; margin: 0 auto 20px; max-width: 140px; height: auto; }
        .logo-header { max-width: 50px; height: auto; margin-right: 15px; }
        
        h2, h3 { margin-bottom: 24px; color: var(--primary); text-align: center; font-weight: 700; }
        
        /* Controle de Telas (Fade In) */
        .page { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .page.active { display: block; opacity: 1; }
        
        /* Formulários */
        .form-group { margin-bottom: 18px; }
        .form-row { display: flex; gap: 15px; }
        .form-col { flex: 1; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #475569; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; background: #f8fafc; }
        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(5,49,110,0.15); }
        
        /* Animação para campos dinâmicos */
        .dynamic-field { display: none; animation: fadeIn 0.3s ease-in-out; background: #f4f8fc; padding: 15px; border-radius: 8px; border: 1px dashed var(--primary-light); margin-bottom: 18px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Botões */
        button { width: 100%; padding: 14px; border: none; background-color: var(--primary); color: white; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { background-color: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-secondary { background-color: #64748b; margin-top: 12px; }
        .btn-secondary:hover { background-color: #475569; }
        
        /* Grid das Opções Iniciais */
        .doc-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; margin-bottom: 20px; }
        .doc-card { border: 2px solid var(--border); border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; transition: all 0.2s ease; background: #fff; }
        .doc-card:hover { border-color: var(--primary); background: #f4f8fc; transform: translateY(-3px); box-shadow: 0 6px 12px -2px rgba(5,49,110,0.1); }
        .doc-card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }
        .doc-card h3 { margin: 0; font-size: 15px; color: var(--text); }

        /* Card de Exclusão */
        .doc-card.danger:hover { border-color: var(--danger); background: #fef2f2; box-shadow: 0 6px 12px -2px rgba(239,68,68,0.15); }
        .doc-card.danger i { color: var(--danger); }
        
        /* Header Usuário */
        .user-header { display: flex; justify-content: space-between; align-items: center; background: #f4f8fc; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; font-size: 14px; border: 1px solid var(--primary-light); }
        .user-info { font-weight: 600; color: var(--primary); display: flex; align-items: center; }
        .logout-btn { color: var(--danger); cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 5px; transition: 0.2s; background: #fff; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--danger); }
        .logout-btn:hover { background-color: var(--danger); color: white; }
        
        /* Área Restrita */
        .ci-item { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 12px; cursor: pointer; border: 1px solid var(--border); border-left: 5px solid var(--primary); transition: 0.2s; }
        .ci-item:hover { background: #f4f8fc; border-left-color: var(--primary-dark); }
        .ci-item.exclusao { border-left-color: var(--danger); }
        .ci-item.exclusao:hover { background: #fef2f2; border-left-color: #b91c1c; }
        .ci-details { display: none; background: #f1f5f9; padding: 16px; border-radius: 0 0 8px 8px; margin-top: -12px; margin-bottom: 12px; font-size: 14px; line-height: 1.8; border: 1px solid var(--border); border-top: none; }
        
        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 40px; }
        #toast.success { background-color: var(--success); }
        #toast.error { background-color: var(--danger); }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 0; }
            .user-header { flex-direction: column; gap: 15px; }
            .user-info { flex-direction: column; text-align: center; gap: 10px; }
            .logo-header { margin-right: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA LOGIN -->
    <div id="pageLogin" class="page active">
        <img src="prefeitura.png" alt="Logo Prefeitura" class="logo-login">
        <h2>Portal CI - Gestão</h2>
        <form id="formLogin">
            <div class="form-group"><label>Usuário</label><input type="text" id="loginUser" required></div>
            <div class="form-group"><label>Senha</label><input type="password" id="loginPass" required></div>
            <button type="submit" id="btnLogar"><i class="fa-solid fa-right-to-bracket"></i> Acessar</button>
        </form>
    </div>

    <!-- TELA MENU -->
    <div id="pageIndex" class="page">
        <div class="user-header">
            <div class="user-info">
                <img src="prefeitura.png" alt="Logo Prefeitura" class="logo-header">
                <span><i class="fa-solid fa-user-circle"></i> Olá, <span id="lblUser"></span></span>
            </div>
            <div class="logout-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i> Sair</div>
        </div>
        <h3>O que você deseja solicitar?</h3>
        <div class="doc-options">
            <div class="doc-card" onclick="abrirFormulario('Troca Temporária')">
                <i class="fa-solid fa-user-clock"></i><h3>Troca Temporária</h3>
            </div>
            <div class="doc-card" onclick="abrirFormulario('Troca Permanente')">
                <i class="fa-solid fa-user-check"></i><h3>Troca Permanente</h3>
            </div>
            <div class="doc-card" onclick="abrirFormulario('Novo Profissional')">
                <i class="fa-solid fa-user-plus"></i><h3>Novo Profissional</h3>
            </div>
            <div class="doc-card danger" onclick="abrirFormulario('Exclusão de Profissional')">
                <i class="fa-solid fa-user-minus"></i><h3>Exclusão</h3>
            </div>
        </div>
        <button id="btnAreaRestrita" class="btn-secondary" style="display:none;" onclick="abrirAreaRestrita()">
            <i class="fa-solid fa-unlock-keyhole"></i> Acesso Restrito
        </button>
    </div>

    <!-- TELA FORMULÁRIO -->
    <div id="pageForm" class="page">
        <h2 id="formTitle">Formulário</h2>
        <form id="formCI">
            <div class="form-group">
                <label>Nome Completo do Profissional</label>
                <input type="text" id="profNome" required autocomplete="off">
            </div>
            
            <div class="form-row">
                <div class="form-col form-group">
                    <label>Ocupação (CBO)</label>
                    <input type="text" id="profCbo" required autocomplete="off" placeholder="Ex: Técnico em Enfermagem" oninput="analisarCBO()">
                </div>
                <div class="form-col form-group">
                    <label>CPF</label>
                    <input type="text" id="profCpf" required placeholder="000.000.000-00" maxlength="14" autocomplete="off">
                </div>
            </div>

            <!-- Campos Condicionais baseados no CBO -->
            <div class="dynamic-field" id="groupConselho">
                <label><i class="fa-solid fa-id-card-clip"></i> Número do Conselho (Registro)</label>
                <input type="text" id="profConselho" placeholder="Ex: COREN 123456 / CRM 12345">
            </div>

            <div class="dynamic-field form-row" id="groupACS">
                <div class="form-col form-group" style="margin-bottom:0;">
                    <label><i class="fa-solid fa-map-location-dot"></i> Área</label>
                    <input type="text" id="profArea" placeholder="Número/Nome da Área">
                </div>
                <div class="form-col form-group" style="margin-bottom:0;">
                    <label><i class="fa-solid fa-location-crosshairs"></i> Micro-Área</label>
                    <input type="text" id="profMicroArea" placeholder="Número da Micro-Área">
                </div>
            </div>

            <!-- Campos Específicos "Novo Profissional" -->
            <div class="dynamic-field" id="groupNovoProfissional">
                <div class="form-row">
                    <div class="form-col form-group" style="margin-bottom:0;">
                        <label>Tipo de Vínculo</label>
                        <select id="profVinculo">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="Processo Seletivo">Processo Seletivo</option>
                            <option value="Residente">Residente</option>
                            <option value="Estatutário">Estatutário</option>
                        </select>
                    </div>
                    <div class="form-col form-group" style="margin-bottom:0;">
                        <label>Carga Horária Semanal</label>
                        <input type="text" id="profCargaHoraria" placeholder="Ex: 40h">
                    </div>
                </div>
                <div class="form-row" style="margin-top: 15px;">
                    <div class="form-col form-group" style="margin-bottom:0;">
                        <label style="color: var(--primary);"><i class="fa-regular fa-calendar-check"></i> Data de Entrada</label>
                        <input type="date" id="profDataEntrada">
                    </div>
                </div>
            </div>

            <!-- Campo Específico "Exclusão" -->
            <div class="dynamic-field" id="groupDataDesligamento" style="border-color: var(--danger); background: #fef2f2;">
                <label style="color: var(--danger);"><i class="fa-regular fa-calendar-xmark"></i> Data de Desligamento</label>
                <input type="date" id="profDataDesligamento">
            </div>

            <div class="form-group" id="groupUnidadeAtual">
                <label id="lblUnidadeAtual">Unidade Atual</label>
                <select id="unidadeAtual" onchange="verificarEquipe()"></select>
            </div>
            
            <div class="form-group" id="groupUnidadeDestino">
                <label id="lblUnidadeDestino">Unidade Destino</label>
                <select id="unidadeDestino" onchange="verificarEquipe()"></select>
            </div>
            
            <div class="form-group" id="groupEquipe">
                <label id="lblEquipe">Equipe de Lotação</label>
                <select id="profEquipe">
                    <option value="EQUIPE 1">EQUIPE 1</option>
                    <option value="EQUIPE 2">EQUIPE 2</option>
                </select>
            </div>
            
            <button type="submit" id="btnEnviar"><i class="fa-solid fa-paper-plane"></i> Enviar Documento</button>
            <button type="button" class="btn-secondary" onclick="voltarIndex()"><i class="fa-solid fa-arrow-left"></i> Cancelar</button>
        </form>
    </div>

    <!-- TELA ÁREA RESTRITA -->
    <div id="pageRestrita" class="page">
        <h2><i class="fa-solid fa-shield-halved"></i> CI's Recebidas</h2>
        <div id="listaCIs" style="margin-bottom: 20px;">Carregando histórico...</div>
        <button type="button" class="btn-secondary" onclick="voltarIndex()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby3R7VYM7xHxWxrp1tX6McYm5BALrNPCxKYfgaqv_MMUg0JyjLcLZUQgul-gTA0mEfmxQ/exec";

    let usuarioLogado = null;
    let tipoDocumentoAtual = "";

    const unidades = [
        "ESF 01 – RUI RAMOS", "ESF 02 – MARDUQUE", "ESF 03 – CIDADE NOVA", "ESF 04 – COHAB", 
        "ESF 05 – TARRAGO", "ESF 06 – SÃO JOÃO", "ESF 07 – UNIÃO DAS VILAS", "ESF 09 – BARRAGEM", 
        "UBS 10 - SÃO MARCOS", "UBS 11 – JOÃO ARREGUI", "UBS 12 – PLANO ALTO", "ESF 14 – TABAJARA BRITES", 
        "ESF 15 – HIPICA", "ESF 16 – CIDADE ALEGRIA", "ESF 17 – NOVA ESPERANÇA", "ESF 18 – PROFLURB", 
        "ESF 19 – JOÃO PAULO II", "ESF 20 – CAIC", "ESF 21 – CENTRO", "ESF 22 – CABO LUIS QUEVEDO", 
        "ESF 23 – SANTO ANTÔNIO", "CONSULTORIO NA RUA", "CENTRO DE FISIOTERAPIA", "POLICLÍNICA ADULTO", 
        "POLICLÍNICA INFANTIL", "SAÚDE DA MULHER", "TRATAMENTO FORA DOMICÍLIO", "LABORATÓRIO MUNICIPAL", 
        "AGENDAMENTO", "UNIDADE SENTINELA", "CAPS AD", "CAPS II", "AMBULATÓRIO DE SAÚDE MENTAL", 
        "SALA DE VACINAS", "VIGILÂNCIA EPIDEMIOLOGICA", "VIGILÂNCIA SANITÁRIA"
    ];

    const semEquipe = [
        "ESF 02 – MARDUQUE", "ESF 03 – CIDADE NOVA", "ESF 04 – COHAB", "ESF 05 – TARRAGO", 
        "ESF 09 – BARRAGEM", "ESF 15 – HIPICA", "ESF 18 – PROFLURB", "ESF 19 – JOÃO PAULO II", 
        "ESF 20 – CAIC", "ESF 23 – SANTO ANTÔNIO", "CENTRO DE FISIOTERAPIA", "POLICLÍNICA ADULTO", 
        "POLICLÍNICA INFANTIL", "SAÚDE DA MULHER", "TRATAMENTO FORA DOMICÍLIO", "LABORATÓRIO MUNICIPAL", 
        "AGENDAMENTO", "UNIDADE SENTINELA", "CAPS AD", "CAPS II", "AMBULATÓRIO DE SAÚDE MENTAL", 
        "SALA DE VACINAS", "VIGILÂNCIA EPIDEMIOLOGICA", "VIGILÂNCIA SANITÁRIA"
    ];

    function showToast(msg, tipo = "success") {
        const toast = document.getElementById("toast");
        toast.innerText = msg; toast.className = `show ${tipo}`;
        setTimeout(() => toast.className = "", 3500);
    }

    // Mascara CPF
    document.getElementById("profCpf").addEventListener("input", function(e) {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 11) v = v.substring(0, 11);
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        e.target.value = v;
    });

    // Analisa as palavras do CBO para exibir Conselho ou Área/Micro-área
    function analisarCBO() {
        const cboText = document.getElementById("profCbo").value.toLowerCase();
        
        // Regra do Conselho (Registro)
        const profissoesConselho = ["médic", "medic", "enferm", "nutricionist", "dentist", "odont", "psicólog", "psicolog", "fisioterapeut"];
        const exigeConselho = profissoesConselho.some(p => cboText.includes(p));
        
        document.getElementById("groupConselho").style.display = exigeConselho ? "block" : "none";
        document.getElementById("profConselho").required = exigeConselho;

        // Regra do Agente Comunitário (ACS)
        const exigeACS = cboText.includes("agente comunit") || cboText.includes("acs");
        
        document.getElementById("groupACS").style.display = exigeACS ? "flex" : "none";
        document.getElementById("profArea").required = exigeACS;
        document.getElementById("profMicroArea").required = exigeACS;
    }

    function carregarUnidades() {
        const atual = document.getElementById("unidadeAtual");
        const destino = document.getElementById("unidadeDestino");
        atual.innerHTML = '<option value="" disabled selected>Selecione...</option>';
        destino.innerHTML = '<option value="" disabled selected>Selecione...</option>';
        unidades.forEach(u => { atual.options.add(new Option(u, u)); destino.options.add(new Option(u, u)); });
    }

    function verificarEquipe() {
        let alvo = (tipoDocumentoAtual === "Exclusão de Profissional") 
            ? document.getElementById("unidadeAtual").value 
            : document.getElementById("unidadeDestino").value;

        const group = document.getElementById("groupEquipe");
        group.style.display = (!alvo || semEquipe.includes(alvo)) ? "none" : "block";
    }

    function navegar(tela) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(tela).classList.add('active');
    }

    document.getElementById("formLogin").addEventListener("submit", async function(e) {
        e.preventDefault();
        const btn = document.getElementById("btnLogar");
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Autenticando...';
        
        try {
            let res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", usuario: document.getElementById("loginUser").value, senha: document.getElementById("loginPass").value }) });
            let data = await res.json();
            if(data.success) {
                usuarioLogado = data;
                document.getElementById("lblUser").innerText = data.usuario.toUpperCase();
                document.getElementById("btnAreaRestrita").style.display = data.admin ? "flex" : "none";
                showToast(`Bem-vindo, ${data.usuario}!`, "success");
                navegar("pageIndex"); carregarUnidades();
            } else showToast("Credenciais inválidas.", "error");
        } catch(err) { showToast("Erro de conexão.", "error"); } 
        finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Acessar'; }
    });

    function abrirFormulario(tipo) {
        tipoDocumentoAtual = tipo;
        document.getElementById("formTitle").innerText = `Solicitação: ${tipo}`;
        document.getElementById("formCI").reset();
        analisarCBO(); // Reseta os campos dinâmicos do CBO

        // Controle de Exibição dos Blocos
        const grpNovo = document.getElementById("groupNovoProfissional");
        const grpDeslig = document.getElementById("groupDataDesligamento");
        const grpAtu = document.getElementById("groupUnidadeAtual");
        const grpDes = document.getElementById("groupUnidadeDestino");
        
        // Reset defaults
        grpNovo.style.display = "none"; document.getElementById("profVinculo").required = false; document.getElementById("profCargaHoraria").required = false; document.getElementById("profDataEntrada").required = false;
        grpDeslig.style.display = "none"; document.getElementById("profDataDesligamento").required = false;
        
        if (tipo === "Novo Profissional") {
            grpNovo.style.display = "block"; // Usando block porque agora tem múltiplas linhas no HTML
            document.getElementById("profVinculo").required = true;
            document.getElementById("profCargaHoraria").required = true;
            document.getElementById("profDataEntrada").required = true; // Torna Data de Entrada obrigatória
            
            grpAtu.style.display = "none"; document.getElementById("unidadeAtual").required = false;
            grpDes.style.display = "block"; document.getElementById("unidadeDestino").required = true;
            document.getElementById("lblUnidadeDestino").innerText = "Unidade de Lotação";
            document.getElementById("lblEquipe").innerText = "Equipe de Lotação";
            document.getElementById("btnEnviar").style.backgroundColor = "var(--primary)";

        } else if (tipo === "Exclusão de Profissional") {
            grpDeslig.style.display = "block";
            document.getElementById("profDataDesligamento").required = true;
            
            grpAtu.style.display = "block"; document.getElementById("unidadeAtual").required = true;
            grpDes.style.display = "none"; document.getElementById("unidadeDestino").required = false;
            document.getElementById("lblEquipe").innerText = "Equipe Atual";
            document.getElementById("btnEnviar").style.backgroundColor = "var(--danger)";

        } else if (tipo === "Troca Temporária") {
            grpAtu.style.display = "none"; document.getElementById("unidadeAtual").required = false;
            grpDes.style.display = "block"; document.getElementById("unidadeDestino").required = true;
            document.getElementById("lblUnidadeDestino").innerText = "Unidade Destino";
            document.getElementById("lblEquipe").innerText = "Equipe de Lotação";
            document.getElementById("btnEnviar").style.backgroundColor = "var(--primary)";
            
        } else { // Troca Permanente
            grpAtu.style.display = "block"; document.getElementById("unidadeAtual").required = true;
            grpDes.style.display = "block"; document.getElementById("unidadeDestino").required = true;
            document.getElementById("lblUnidadeDestino").innerText = "Nova Unidade (Destino)";
            document.getElementById("lblEquipe").innerText = "Nova Equipe (Destino)";
            document.getElementById("btnEnviar").style.backgroundColor = "var(--primary)";
        }

        navegar("pageForm"); verificarEquipe();
    }

    function voltarIndex() { navegar("pageIndex"); }
    function logout() { usuarioLogado = null; navegar("pageLogin"); document.getElementById("formLogin").reset(); }

    document.getElementById("formCI").addEventListener("submit", async function(e) {
        e.preventDefault();
        if(document.getElementById("profCpf").value.length !== 14) return showToast("CPF incompleto.", "error");

        const btn = document.getElementById("btnEnviar");
        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registrando...';

        let uAtual = document.getElementById("unidadeAtual").value;
        let uDest = document.getElementById("unidadeDestino").value;
        if (tipoDocumentoAtual === "Novo Profissional") uAtual = "Admissão Nova";
        if (tipoDocumentoAtual === "Troca Temporária") uAtual = "Não se aplica (Temporária)";
        if (tipoDocumentoAtual === "Exclusão de Profissional") uDest = "Desligamento";

        // Coleta os novos campos
        const payload = {
            action: "enviarCI",
            remetente: usuarioLogado.usuario,
            tipoTroca: tipoDocumentoAtual,
            nomeProfissional: document.getElementById("profNome").value.toUpperCase(),
            cbo: document.getElementById("profCbo").value,
            cpf: document.getElementById("profCpf").value,
            
            conselho: document.getElementById("groupConselho").style.display !== "none" ? document.getElementById("profConselho").value : "Não se aplica",
            area: document.getElementById("groupACS").style.display !== "none" ? document.getElementById("profArea").value : "Não se aplica",
            microArea: document.getElementById("groupACS").style.display !== "none" ? document.getElementById("profMicroArea").value : "Não se aplica",
            vinculo: document.getElementById("groupNovoProfissional").style.display !== "none" ? document.getElementById("profVinculo").value : "Não se aplica",
            cargaHoraria: document.getElementById("groupNovoProfissional").style.display !== "none" ? document.getElementById("profCargaHoraria").value : "Não se aplica",
            dataDesligamento: document.getElementById("groupDataDesligamento").style.display !== "none" ? document.getElementById("profDataDesligamento").value : "Não se aplica",
            
            // Nova variável enviada
            dataEntrada: document.getElementById("groupNovoProfissional").style.display !== "none" ? document.getElementById("profDataEntrada").value : "Não se aplica",

            unidadeAtual: uAtual,
            unidadeDestino: uDest,
            equipe: document.getElementById("groupEquipe").style.display === "none" ? "Não se aplica" : document.getElementById("profEquipe").value
        };

        try {
            let res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            let data = await res.json();
            if(data.success) { showToast("Registrado com sucesso!", "success"); voltarIndex(); }
        } catch(err) { showToast("Falha na comunicação.", "error"); } 
        finally { 
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Documento'; 
            if(tipoDocumentoAtual === "Exclusão de Profissional") btn.style.backgroundColor = "var(--danger)";
        }
    });

    async function abrirAreaRestrita() {
        navegar("pageRestrita");
        const lista = document.getElementById("listaCIs");
        lista.innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>';

        try {
            let res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "listarCIs" }) });
            let resData = await res.json();
            
            if(resData.success) {
                lista.innerHTML = "";
                let dados = resData.dados.reverse();
                if(dados.length === 0) return lista.innerHTML = "<div style='text-align:center;'>Nenhum registro.</div>"; 
                
                dados.forEach((ci, i) => {
                    let item = document.createElement("div");
                    item.className = "ci-item" + (ci.tipoTroca === "Exclusão de Profissional" ? " exclusao" : "");
                    
                    let ic = ci.tipoTroca === "Novo Profissional" ? "fa-user-plus" : ci.tipoTroca === "Exclusão de Profissional" ? "fa-user-minus" : "fa-file-lines";
                    let cor = ci.tipoTroca === "Exclusão de Profissional" ? "var(--danger)" : "var(--primary)";

                    item.innerHTML = `<i class="fa-solid ${ic}" style="color:${cor}; margin-right:8px;"></i> <strong>${ci.nomeProfissional}</strong>
                                      <div style="font-size:12px; color:#64748b; margin-top:4px;">${ci.tipoTroca} • ${ci.dataHora}</div>`;
                    
                    item.onclick = () => { let d = document.getElementById(`det-${i}`); d.style.display = d.style.display === "block" ? "none" : "block"; };
                    
                    let det = document.createElement("div"); det.id = `det-${i}`; det.className = "ci-details";
                    
                    // Constrói os detalhes formatados
                    let detalhesExtras = "";
                    if(ci.conselho && ci.conselho !== "Não se aplica") detalhesExtras += `<strong><i class="fa-solid fa-id-badge"></i> Conselho:</strong> ${ci.conselho}<br>`;
                    if(ci.vinculo && ci.vinculo !== "Não se aplica") detalhesExtras += `<strong><i class="fa-solid fa-file-contract"></i> Vínculo:</strong> ${ci.vinculo} (${ci.cargaHoraria})<br>`;
                    if(ci.area && ci.area !== "Não se aplica") detalhesExtras += `<strong><i class="fa-solid fa-map"></i> ACS:</strong> Área ${ci.area} / Micro ${ci.microArea}<br>`;
                    
                    if(ci.dataEntrada && ci.dataEntrada !== "Não se aplica") {
                        let dObj = ci.dataEntrada.split('-');
                        let dataFormatada = dObj.length === 3 ? `${dObj[2]}/${dObj[1]}/${dObj[0]}` : ci.dataEntrada;
                        detalhesExtras += `<strong><i class="fa-regular fa-calendar-check" style="color:var(--primary)"></i> Data Entrada:</strong> ${dataFormatada}<br>`;
                    }

                    if(ci.dataDesligamento && ci.dataDesligamento !== "Não se aplica") {
                        let dObj = ci.dataDesligamento.split('-');
                        let dataFormatada = dObj.length === 3 ? `${dObj[2]}/${dObj[1]}/${dObj[0]}` : ci.dataDesligamento;
                        detalhesExtras += `<strong><i class="fa-regular fa-calendar-xmark" style="color:red"></i> Data Desligamento:</strong> ${dataFormatada}<br>`;
                    }

                    det.innerHTML = `
                        <strong><i class="fa-solid fa-user-tie"></i> Solic.:</strong> ${ci.remetente}<br>
                        <strong><i class="fa-solid fa-id-card"></i> CPF:</strong> ${ci.cpf}<br>
                        <strong><i class="fa-solid fa-briefcase-medical"></i> CBO:</strong> ${ci.cbo}<br>
                        ${detalhesExtras}
                        <hr style="border-top:1px solid #cbd5e1; margin:8px 0;">
                        <strong><i class="fa-solid fa-building"></i> Origem:</strong> ${ci.unidadeAtual}<br>
                        <strong><i class="fa-solid fa-hospital"></i> Destino:</strong> ${ci.unidadeDestino}<br>
                        <strong><i class="fa-solid fa-users"></i> Equipe:</strong> ${ci.equipe}
                    `;
                    lista.append(item, det);
                });
            }
        } catch(err) { lista.innerHTML = "<div style='color:red; text-align:center;'>Erro de conexão.</div>"; }
    }
</script>
</body>
</html>
